# Cloud Build pipeline for deploying to Cloud Run.
# This uses Cloud Run's built-in source deploy for simplicity.

steps:
  # Single step: Build and deploy from source
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mining-club
      - --source
      - .
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --cpu
      - "1"
      - --memory
      - 512Mi
      - --min-instances
      - "0"
      - --max-instances
      - "3"
      - --timeout
      - 300s
      - --set-env-vars
      - NODE_ENV=production
      - --set-secrets
      - DATABASE_URL_POOLER=neon_database_url:latest,DATABASE_URL=neon_database_url:latest,FIREBASE_SERVICE_ACCOUNT=firebase_service_account_json:latest

options:
  logging: NONE

timeout: 1800s
